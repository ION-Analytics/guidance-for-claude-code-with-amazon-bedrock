# ABOUTME: Local OTEL Collector sidecar config for Claude Code monitoring
# ABOUTME: Receives metrics on localhost, adds user attributes from headers, exports to CloudWatch OTLP with SigV4
#
# Placeholders replaced by installer:
#   ${REGION} - AWS region (e.g. us-east-1)

extensions:
  sigv4auth:
    service: "monitoring"
    region: "${REGION}"

receivers:
  otlp:
    protocols:
      http:
        endpoint: localhost:4318
        include_metadata: true

processors:
  batch/metrics:
    timeout: 60s
  # Extract HTTP headers (injected by otelHeadersHelper) to resource attributes
  # Headers are normalized to lowercase in metadata
  attributes:
    actions:
      - key: user.email
        from_context: metadata.x-user-email
        action: upsert
      - key: user.id
        from_context: metadata.x-user-id
        action: upsert
      - key: user.name
        from_context: metadata.x-user-name
        action: upsert
      - key: department
        from_context: metadata.x-department
        action: upsert
      - key: team.id
        from_context: metadata.x-team-id
        action: upsert
      - key: cost_center
        from_context: metadata.x-cost-center
        action: upsert
      - key: organization
        from_context: metadata.x-organization
        action: upsert
      - key: location
        from_context: metadata.x-location
        action: upsert
      - key: role
        from_context: metadata.x-role
        action: upsert
      - key: manager
        from_context: metadata.x-manager
        action: upsert
      - key: deployment.environment
        value: "production"
        action: insert
  transform/add_start_time:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          # If startTimeUnixNano is omitted or 0, match it to the current data point's timestamp
          - set(start_time_unix_nano, time_unix_nano) where start_time_unix_nano == nil or start_time_unix_nano == 0        

exporters:
  otlphttp:
    tls:
      insecure: false
    endpoint: "https://monitoring.${REGION}.amazonaws.com"
    auth:
      authenticator: sigv4auth

service:
  extensions: [sigv4auth]
  telemetry:
    logs:
      level: debug
      output_paths: [stderr]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [attributes, batch/metrics]
      exporters: [otlphttp]
