AWSTemplateFormatVersion: '2010-09-09'
Description: 'Distribution infra - S3 bucket and IAM for package distribution'

Parameters:
  IdentityPoolName:
    Type: String
    Default: claude-code
    Description: Name prefix for resources (from identity pool name)

  AwsOrgId:
    Type: String
    Default: ''
    Description: AWS Organization ID (e.g. o-xxxxxxxxxx). When set, grants read access to all accounts in the org without presigned URLs.

Conditions:
  OrgIdProvided: !Not [!Equals [!Ref AwsOrgId, '']]

Resources:
  # S3 Bucket for access logs
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${IdentityPoolName}-distribution-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: DistributionAccessLogs

  # S3 Bucket for package distribution
  DistributionBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${IdentityPoolName}-distribution-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: package-downloads/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldPackages
            Status: Enabled
            Prefix: packages/
            ExpirationInDays: 30
            NoncurrentVersionExpirationInDays: 7
          - Id: DeleteOldWindowsBuilds
            Status: Enabled
            Prefix: windows-builds/
            ExpirationInDays: 7
            NoncurrentVersionExpirationInDays: 1
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: PackageDistribution

  # Bucket policy: allow any principal in the AWS org to download packages
  DistributionBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: OrgIdProvided
    Properties:
      Bucket: !Ref DistributionBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrgRead
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${DistributionBucket.Arn}/packages/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref AwsOrgId

Outputs:
  DistributionBucket:
    Description: S3 bucket for package distribution
    Value: !Ref DistributionBucket
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucket'

  DistributionBucketArn:
    Description: ARN of the distribution bucket
    Value: !GetAtt DistributionBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DistributionBucketArn'

  LoggingBucket:
    Description: S3 bucket for access logs
    Value: !Ref LoggingBucket
    Export:
      Name: !Sub '${AWS::StackName}-LoggingBucket'
