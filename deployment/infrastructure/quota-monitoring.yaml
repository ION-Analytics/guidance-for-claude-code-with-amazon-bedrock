AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code quota monitoring stack for per-user token limits and alerts with fine-grained policy support'

Parameters:
  MonthlyTokenLimit:
    Type: Number
    Default: 10000000
    Description: Default monthly token limit per user (10M tokens) - used when no policy is defined
    MinValue: 1000000
    MaxValue: 1000000000

  WarningThreshold80:
    Type: Number
    Default: 8000000
    Description: Default warning threshold at 80% (8M tokens) - used when no policy is defined

  WarningThreshold90:
    Type: Number
    Default: 9000000
    Description: Default warning threshold at 90% (9M tokens) - used when no policy is defined

  DailyTokenLimit:
    Type: Number
    Default: 366667
    Description: Default daily token limit per user (monthly/30 * 1.1) - 0 to disable daily limits
    MinValue: 0
    MaxValue: 100000000

  MonthlyCostLimit:
    Type: String
    Default: ''
    Description: Default monthly cost limit per user in USD (e.g. 50.00) - leave empty to use token limits only

  DailyCostLimit:
    Type: String
    Default: ''
    Description: Default daily cost limit per user in USD (e.g. 5.00) - leave empty to use token limits only

  DailyEnforcementMode:
    Type: String
    Default: 'alert'
    AllowedValues:
      - 'alert'
      - 'block'
    Description: Enforcement mode for daily limits - alert (warn only) or block (deny access)

  MonthlyEnforcementMode:
    Type: String
    Default: 'block'
    AllowedValues:
      - 'alert'
      - 'block'
    Description: Enforcement mode for monthly limits - alert (warn only) or block (deny access)

  EnableFinegrainedQuotas:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable fine-grained quota policies (user/group/default levels)

  EnableBypassDetection:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Alert when a user has Bedrock usage but no CollectorHeartbeat in the same window (indicates otelcol sidecar not running)

  EnableUsageDashboard:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Deploy the internal Bedrock usage dashboard (Fargate + internal ALB)

  UsageDashboardImage:
    Type: String
    Default: ''
    Description: ECR image URI for the usage dashboard container (required when EnableUsageDashboard=true)

  VpcId:
    Type: String
    Default: ''
    Description: VPC ID for the usage dashboard ALB and Fargate task

  SubnetIds:
    Type: String
    Default: ''
    Description: Comma-separated private subnet IDs for the Fargate task

  AlbSubnetIds:
    Type: String
    Default: ''
    Description: Comma-separated subnet IDs for the internal ALB (can be same as SubnetIds)

  UsageDashboardCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for HTTPS on the usage dashboard ALB

  # JWT Authentication Parameters for Quota Check API
  OidcIssuerUrl:
    Type: String
    Description: OIDC provider issuer URL for JWT validation (e.g., https://company.okta.com)

  OidcClientId:
    Type: String
    Description: OIDC client ID (audience) for JWT validation

Conditions:
  UsageDashboardEnabled: !Equals [!Ref EnableUsageDashboard, 'true']

Resources:
  # DynamoDB table for quota policies (user, group, default levels)
  QuotaPolicies:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: QuotaPolicies
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: policy_type
          AttributeType: S
        - AttributeName: identifier
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: PolicyTypeIndex
          KeySchema:
            - AttributeName: policy_type
              KeyType: HASH
            - AttributeName: identifier
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: QuotaPolicies
        - Key: Purpose
          Value: Fine-grained quota policy definitions

  # DynamoDB table for user quota tracking
  UserQuotaMetrics:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserQuotaMetrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: UserQuotaMetrics
        - Key: Purpose
          Value: User quota monitoring and alerts

  # SNS Topic for quota alerts
  QuotaAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: claude-code-quota-alerts
      DisplayName: Claude Code Quota Alerts
      Tags:
        - Key: Name
          Value: ClaudeCodeQuotaAlerts
        - Key: Purpose
          Value: Quota monitoring notifications

  # IAM Role for Quota Monitor Lambda
  QuotaMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuotaMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt QuotaPolicies.Arn
                  - !Sub '${QuotaPolicies.Arn}/index/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref QuotaAlertTopic
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - cloudwatch:PutMetricData
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:bedrock-model-invocation:*'

  # Lambda function for quota monitoring
  QuotaMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-quota-monitor
      Description: Monitors user token usage and sends alerts when quotas are exceeded
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QuotaMonitorRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          POLICIES_TABLE: !Ref QuotaPolicies
          SNS_TOPIC_ARN: !Ref QuotaAlertTopic
          MONTHLY_TOKEN_LIMIT: !Ref MonthlyTokenLimit
          WARNING_THRESHOLD_80: !Ref WarningThreshold80
          WARNING_THRESHOLD_90: !Ref WarningThreshold90
          DAILY_TOKEN_LIMIT: !Ref DailyTokenLimit
          DAILY_ENFORCEMENT_MODE: !Ref DailyEnforcementMode
          MONTHLY_ENFORCEMENT_MODE: !Ref MonthlyEnforcementMode
          ENABLE_FINEGRAINED_QUOTAS: !Ref EnableFinegrainedQuotas
          ENABLE_BYPASS_DETECTION: !Ref EnableBypassDetection
          METRICS_REGION: !Ref 'AWS::Region'
          INVOCATION_LOG_GROUP: bedrock-model-invocation
          MONTHLY_COST_LIMIT: !Ref MonthlyCostLimit
          DAILY_COST_LIMIT: !Ref DailyCostLimit
      Code: ./lambda-functions/quota_monitor/

  # EventBridge Rule to run quota monitor every 15 minutes
  QuotaMonitorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: claude-code-quota-monitor-schedule
      Description: Trigger quota monitoring every 15 minutes
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt QuotaMonitorFunction.Arn
          Id: QuotaMonitorTarget

  # Permission for EventBridge to invoke the Lambda
  QuotaMonitorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuotaMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt QuotaMonitorScheduleRule.Arn

  # ============================================
  # Quota Check API (Phase 2 - Access Blocking)
  # ============================================

  # IAM Role for Quota Check Lambda
  QuotaCheckRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuotaCheckPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
                  - !GetAtt QuotaPolicies.Arn
                  - !Sub '${QuotaPolicies.Arn}/index/*'

  # Lambda function for real-time quota checking
  QuotaCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-quota-check
      Description: Real-time quota check for credential issuance - blocks access when quota exceeded
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QuotaCheckRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          POLICIES_TABLE: !Ref QuotaPolicies
          MONTHLY_TOKEN_LIMIT: !Ref MonthlyTokenLimit
          DAILY_TOKEN_LIMIT: !Ref DailyTokenLimit
          DAILY_ENFORCEMENT_MODE: !Ref DailyEnforcementMode
          MONTHLY_ENFORCEMENT_MODE: !Ref MonthlyEnforcementMode
          MONTHLY_COST_LIMIT: !Ref MonthlyCostLimit
          DAILY_COST_LIMIT: !Ref DailyCostLimit
          ENABLE_FINEGRAINED_QUOTAS: !Ref EnableFinegrainedQuotas
      Code: ./lambda-functions/quota_check/

  # HTTP API Gateway (v2 - cheaper and faster than REST API)
  QuotaCheckApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-quota-check-api'
      Description: Real-time quota check API for Claude Code credential provider (JWT authenticated)
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  # JWT Authorizer for OIDC token validation
  QuotaCheckAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref QuotaCheckApi
      AuthorizerType: JWT
      Name: oidc-jwt-authorizer
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        Issuer: !Ref OidcIssuerUrl
        Audience:
          - !Ref OidcClientId

  # Lambda integration for API Gateway
  QuotaCheckIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuotaCheckApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt QuotaCheckFunction.Arn
      PayloadFormatVersion: '2.0'

  # Route for GET /check (JWT authenticated)
  QuotaCheckRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuotaCheckApi
      RouteKey: 'GET /check'
      Target: !Sub 'integrations/${QuotaCheckIntegration}'
      AuthorizerId: !Ref QuotaCheckAuthorizer
      AuthorizationType: JWT

  # Default stage with auto-deploy
  QuotaCheckStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QuotaCheckApi
      StageName: '$default'
      AutoDeploy: true

  # Permission for API Gateway to invoke Lambda
  QuotaCheckLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuotaCheckFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuotaCheckApi}/*'

  # ============================================
  # End Quota Check API
  # ============================================

  # ============================================
  # Usage Dashboard (Fargate + internal ALB)
  # ============================================

  UsageDashboardCluster:
    Type: AWS::ECS::Cluster
    Condition: UsageDashboardEnabled
    Properties:
      ClusterName: !Sub '${AWS::StackName}-usage-dashboard'

  UsageDashboardTaskRole:
    Type: AWS::IAM::Role
    Condition: UsageDashboardEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UsageDashboardPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:bedrock-model-invocation:*'
              - Effect: Allow
                Action:
                  - cloudwatch:ListMetrics
                  - cloudwatch:GetMetricData
                Resource: '*'

  UsageDashboardExecutionRole:
    Type: AWS::IAM::Role
    Condition: UsageDashboardEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  UsageDashboardLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: UsageDashboardEnabled
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}-usage-dashboard'
      RetentionInDays: 14

  UsageDashboardTaskDef:
    Type: AWS::ECS::TaskDefinition
    Condition: UsageDashboardEnabled
    Properties:
      Family: !Sub '${AWS::StackName}-usage-dashboard'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      TaskRoleArn: !GetAtt UsageDashboardTaskRole.Arn
      ExecutionRoleArn: !GetAtt UsageDashboardExecutionRole.Arn
      ContainerDefinitions:
        - Name: usage-dashboard
          Image: !Ref UsageDashboardImage
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref 'AWS::Region'
            - Name: INVOCATION_LOG_GROUP
              Value: bedrock-model-invocation
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref UsageDashboardLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: dashboard

  UsageDashboardAlbSg:
    Type: AWS::EC2::SecurityGroup
    Condition: UsageDashboardEnabled
    Properties:
      GroupDescription: Usage dashboard internal ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-dashboard-alb-sg'

  UsageDashboardTaskSg:
    Type: AWS::EC2::SecurityGroup
    Condition: UsageDashboardEnabled
    Properties:
      GroupDescription: Usage dashboard Fargate task
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref UsageDashboardAlbSg
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-dashboard-task-sg'

  UsageDashboardAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: UsageDashboardEnabled
    Properties:
      Name: !Sub '${AWS::StackName}-dashboard'
      Scheme: internal
      Type: application
      Subnets: !Split [',', !Ref AlbSubnetIds]
      SecurityGroups:
        - !Ref UsageDashboardAlbSg
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-usage-dashboard'

  UsageDashboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: UsageDashboardEnabled
    Properties:
      Name: cc-usage-dashboard-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  UsageDashboardListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UsageDashboardEnabled
    Properties:
      LoadBalancerArn: !Ref UsageDashboardAlb
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref UsageDashboardCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref UsageDashboardTargetGroup

  UsageDashboardService:
    Type: AWS::ECS::Service
    Condition: UsageDashboardEnabled
    DependsOn: UsageDashboardListener
    Properties:
      ServiceName: !Sub '${AWS::StackName}-usage-dashboard'
      Cluster: !Ref UsageDashboardCluster
      TaskDefinition: !Ref UsageDashboardTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Split [',', !Ref SubnetIds]
          SecurityGroups:
            - !Ref UsageDashboardTaskSg
      LoadBalancers:
        - ContainerName: usage-dashboard
          ContainerPort: 8080
          TargetGroupArn: !Ref UsageDashboardTargetGroup

  # ============================================
  # End Usage Dashboard
  # ============================================

Outputs:
  QuotaTableName:
    Description: Name of the UserQuotaMetrics DynamoDB table
    Value: !Ref UserQuotaMetrics
    Export:
      Name: !Sub '${AWS::StackName}-QuotaTableName'

  QuotaTableArn:
    Description: ARN of the UserQuotaMetrics DynamoDB table
    Value: !GetAtt UserQuotaMetrics.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaTableArn'

  PoliciesTableName:
    Description: Name of the QuotaPolicies DynamoDB table for fine-grained quotas
    Value: !Ref QuotaPolicies
    Export:
      Name: !Sub '${AWS::StackName}-PoliciesTableName'

  PoliciesTableArn:
    Description: ARN of the QuotaPolicies DynamoDB table
    Value: !GetAtt QuotaPolicies.Arn
    Export:
      Name: !Sub '${AWS::StackName}-PoliciesTableArn'

  QuotaAlertTopicArn:
    Description: SNS Topic ARN for quota alerts - subscribe to this for notifications
    Value: !Ref QuotaAlertTopic
    Export:
      Name: !Sub '${AWS::StackName}-QuotaAlertTopicArn'

  QuotaMonitorFunctionArn:
    Description: ARN of the quota monitoring Lambda function
    Value: !GetAtt QuotaMonitorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaMonitorFunctionArn'

  QuotaCheckApiEndpoint:
    Description: HTTP API endpoint for real-time quota checks - configure in credential provider
    Value: !Sub 'https://${QuotaCheckApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-QuotaCheckApiEndpoint'

  QuotaCheckFunctionArn:
    Description: ARN of the quota check Lambda function
    Value: !GetAtt QuotaCheckFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaCheckFunctionArn'

  UsageDashboardUrl:
    Condition: UsageDashboardEnabled
    Description: Internal ALB URL for the Bedrock usage dashboard
    Value: !Sub 'https://${UsageDashboardAlb.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-UsageDashboardUrl'
